<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bharwara PRO - Live Master</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-red { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 50% { transform: scale(1.1); box-shadow: 0 0 20px 10px rgba(220, 38, 38, 0); } }
        @keyframes pulse-yellow { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } }
        @keyframes pulse-blue { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 50% { transform: scale(1.1); box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0); } }
        
        .pulse-red { animation: pulse-red 1.5s infinite; }
        .pulse-yellow { animation: pulse-yellow 1.5s infinite; }
        .pulse-blue { animation: pulse-blue 1.5s infinite; }
        
        body { 
            background-color: #020617; 
            font-family: ui-sans-serif, system-ui, sans-serif; 
            overflow: hidden; /* Stops native body scrolling */
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const API_KEY = "rr_pf1kalhfdpnrdt40oxa3p8wniipqvudo";
        const BASE_URL = "https://api.railradar.org/api/v1";
        const PROXY = "https://corsproxy.io/?";

        function App() {
            const [status, setStatus] = useState('green'); 
            const [loading, setLoading] = useState(false);
            const [logs, setLogs] = useState([]);
            const [showLogs, setShowLogs] = useState(false);
            const [activeTrain, setActiveTrain] = useState(null);
            const [isMalgadi, setIsMalgadi] = useState(false);
            
            // Added SFH to the node states
            const [nodeStates, setNodeStates] = useState({ UTR: 'idle', GTNR: 'idle', LBH: 'idle', BC: 'idle', ML: 'idle', JRR: 'idle', SFH: 'idle' });
            const [nodeLabels, setNodeLabels] = useState({});
            
            const cache = useRef({ time: 0 });

            const addLog = (msg, type = 'info') => {
                const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                setLogs(prev => [{ time, msg, type }, ...prev]);
            };

            const checkStatus = async () => {
                const now = Date.now();
                if (loading) return;
                
                setLoading(true);
                setIsMalgadi(false);
                addLog("=====================================", "info");
                addLog("📡 Initiating Secure Telemetry Sweep...", "info");
                
                try {
                    const cb = `&_cb=${now}`; 

                    const [eRes, wRes] = await Promise.all([
                        fetch(`${PROXY}${BASE_URL}/trains/between?from=LKO&to=BBK&apiKey=${API_KEY}${cb}`),
                        fetch(`${PROXY}${BASE_URL}/trains/between?from=BBK&to=LKO&apiKey=${API_KEY}${cb}`)
                    ]);

                    const eastList = (await eRes.json()).data?.trains || [];
                    const westList = (await wRes.json()).data?.trains || [];
                    const allTrains = [...eastList, ...westList];
                    
                    addLog(`📋 Daily Schedule: Found ${allTrains.length} total trains.`, "detail");

                    // 4-Hour Asymmetric Filter (-3h to +1h)
                    const nowTime = new Date();
                    const windowTrains = allTrains.filter(t => {
                        const schMin = t.fromStationSchedule?.departureMinutes || 0;
                        const schDate = new Date();
                        schDate.setHours(Math.floor(schMin / 60), schMin % 60, 0, 0);

                        let diffHours = (nowTime - schDate) / 3600000;
                        if (diffHours < -12) diffHours += 24; 
                        if (diffHours > 12) diffHours -= 24;  

                        return diffHours >= -1 && diffHours <= 3; 
                    });

                    addLog(`⚙️ Filter Applied: Isolated ${windowTrains.length} active trains.`, "info");

                    let newNodes = { UTR: 'idle', GTNR: 'idle', LBH: 'idle', BC: 'idle', ML: 'idle', JRR: 'idle', SFH: 'idle' };
                    let newLabels = {};
                    let masterStop = false;
                    let blockTrain = null;
                    let passengerInBlock = false;

                    for (const train of windowTrains) {
                        const isWest = westList.some(wt => wt.trainNumber === train.trainNumber);
                        const tName = train.trainName ? train.trainName.substring(0, 16) : 'Express';
                        
                        const liveRes = await fetch(`${PROXY}${BASE_URL}/trains/${train.trainNumber}?dataType=live&apiKey=${API_KEY}${cb}`);
                        const liveJson = await liveRes.json();
                        const liveData = liveJson.data;
                        
                        if (!liveData) continue;

                        const loc = liveData.currentLocation?.stationCode;
                        const isHalted = liveData.currentLocation?.status === "AT_STATION";
                        
                        // Data Freshness
                        const updateTime = new Date(liveData.lastUpdatedAt).getTime();
                        const diffMins = Math.floor((now - updateTime) / 60000);
                        const freshnessText = diffMins <= 0 ? "Live" : `${diffMins}m ago`;

                        // STRICT GEOFENCING (Added SFH)
                        const activeZones = ['UTR', 'GTNR', 'LBH', 'ML', 'JRR', 'SFH', 'LKO', 'BBK'];

                        if (activeZones.includes(loc)) {
                            const statusText = isHalted ? "AT" : "NEAR";
                            const dirIcon = isWest ? '←' : '→';
                            const label = `${dirIcon} ${statusText} ${loc} · ${freshnessText}`;

                            if (['LBH', 'ML'].includes(loc)) {
                                // RED ZONE
                                newNodes[loc] = 'red'; newNodes.BC = 'red';
                                masterStop = true; passengerInBlock = true;
                                blockTrain = `${train.trainNumber} ${tName}`;
                                newLabels[loc] = label;
                                addLog(`🚨 DANGER: [${train.trainNumber} ${tName}] is ${statusText} ${loc} | Data: ${freshnessText}`, 'err');
                            
                            } else if (['UTR', 'GTNR', 'JRR', 'SFH'].includes(loc)) {
                                // YELLOW ZONE (Added SFH to UI mapping)
                                newNodes[loc] = 'yellow'; 
                                newLabels[loc] = label;
                                addLog(`⚠️ WARNING: [${train.trainNumber} ${tName}] is ${statusText} ${loc} | Data: ${freshnessText}`, 'detail');
                            
                            } else {
                                // OUTSIDE UI GRID (LKO / BBK)
                                addLog(`📍 TRACKING: [${train.trainNumber} ${tName}] is ${statusText} ${loc} (Outside Map) | Data: ${freshnessText}`, 'info');
                            }
                        } else {
                            addLog(`⏭️ OUT OF RANGE: [${train.trainNumber} ${tName}] is currently at ${loc}.`, 'detail');
                        }
                    }

                    // Malgadi Station Board Fetch
                    if (!passengerInBlock) {
                        const mlRes = await fetch(`${PROXY}${BASE_URL}/stations/ML/live?hours=1&apiKey=${API_KEY}${cb}`);
                        const mlData = await mlRes.json();
                        if (mlData.data?.totalTrains > 0) {
                            const num = mlData.data.trains[0].train.number;
                            if (!windowTrains.some(t => t.trainNumber === num)) {
                                setIsMalgadi(true);
                                newNodes.ML = 'red'; newNodes.BC = 'red'; masterStop = true;
                                addLog(`🚨 DANGER: MALGADI [${num}] detected at ML via physical sensor.`, "err");
                            }
                        }
                    }

                    setStatus(masterStop ? 'red' : 'green');
                    setActiveTrain(blockTrain);
                    setNodeStates(newNodes);
                    setNodeLabels(newLabels);
                    cache.current = { time: now };
                    addLog("✅ Live synchronization complete.", "info");

                } catch (err) {
                    addLog(`❌ Fatal Error: ${err.message}`, 'err');
                } finally {
                    setLoading(false);
                }
            };

            return (
                // Used h-[100dvh] for perfect mobile fit without scrollbars
                <div className="max-w-md mx-auto h-[100dvh] w-full p-4 flex flex-col gap-4 text-slate-100 relative">
                    <header className="flex-shrink-0 flex justify-between items-center py-2">
                        <h1 className="text-xl font-black italic tracking-tighter uppercase">Bharwara <span className="text-blue-500">Pro</span></h1>
                        <button onClick={() => setShowLogs(!showLogs)} className={`text-[10px] px-3 py-1 rounded border font-bold uppercase tracking-widest transition-colors z-20 ${showLogs ? 'bg-blue-600 border-blue-500 text-white' : 'bg-slate-800 border-slate-700 text-slate-300'}`}>Console</button>
                    </header>

                    <div className="flex-shrink-0 flex justify-between items-center relative px-1 py-8 bg-slate-900/30 rounded-3xl border border-slate-800/50">
                        <div className="absolute h-[1px] bg-slate-800 left-6 right-6 top-1/2 -translate-y-1/2 -z-10"></div>
                        {['UTR', 'GTNR', 'LBH', 'BC', 'ML', 'JRR', 'SFH'].map(id => (
                            <div key={id} className="flex flex-col items-center gap-1 relative w-10">
                                {nodeLabels[id] && (
                                    <div className={`absolute -top-10 whitespace-nowrap backdrop-blur-md px-1 py-0.5 rounded border text-[6px] font-black animate-pulse uppercase z-10 ${
                                        nodeLabels[id].includes('ago') && parseInt(nodeLabels[id].split('·')[1]) > 5 ? 'bg-red-500/20 border-red-500 text-red-400' : 'bg-white/10 border-white/20 text-white'
                                    }`}>
                                        {nodeLabels[id]}
                                    </div>
                                )}
                                <div className={`w-8 h-8 rounded-full border-2 flex items-center justify-center text-[7px] font-black transition-all duration-500 ${
                                    id === 'BC' ? 
                                        (nodeStates.BC === 'red' ? 'bg-red-600 border-red-500 text-white pulse-red' : 'bg-white border-white text-black') : 
                                        (nodeStates[id] === 'red' ? 'bg-red-600 border-red-500 text-white pulse-red' : 
                                         nodeStates[id] === 'yellow' ? 'bg-amber-500 border-amber-400 text-black pulse-yellow shadow-[0_0_15px_rgba(245,158,11,0.3)]' : 
                                         'bg-slate-950 border-slate-800 text-slate-600')
                                }`}>
                                    {id === 'BC' ? '🚧' : id}
                                </div>
                                <span className="text-[6px] font-black text-slate-500 mt-1 uppercase text-center">{id === 'BC' ? 'Gate' : id}</span>
                            </div>
                        ))}
                    </div>

                    <div className={`flex-grow rounded-3xl bg-slate-900/50 border-2 border-slate-800 flex flex-col items-center justify-center gap-4 shadow-2xl transition-all duration-700 ${loading ? 'border-blue-900/40 bg-blue-950/10' : status === 'red' ? 'border-red-900/40 bg-red-950/10' : ''}`}>
                        <div className={`w-36 h-36 rounded-full transition-all duration-1000 ${loading ? 'bg-blue-600 pulse-blue shadow-[0_0_50px_rgba(59,130,246,0.3)]' : status === 'red' ? 'bg-red-600 pulse-red shadow-[0_0_50px_rgba(220,38,38,0.3)]' : 'bg-emerald-500 shadow-[0_0_50px_rgba(16,185,129,0.2)]'}`}></div>
                        <div className="text-center px-4 mt-4">
                            <h2 className={`font-black uppercase italic tracking-tighter transition-all ${loading ? 'text-blue-400 text-4xl animate-pulse' : status === 'red' ? 'text-red-500 text-5xl' : 'text-emerald-400 text-5xl'}`}>
                                {loading ? 'Syncing' : (status === 'red' ? 'Stop' : 'Go')}
                            </h2>
                            <p className={`text-[9px] font-mono mt-2 tracking-widest uppercase transition-colors ${loading ? 'text-blue-300' : isMalgadi || activeTrain ? 'text-white font-bold animate-pulse' : 'text-slate-500'}`}>
                                {loading ? 'Downloading Telemetry...' : (isMalgadi ? '⚠ Malgadi Detected' : (activeTrain || 'Track Clear'))}
                            </p>
                        </div>
                    </div>

                    <button onClick={checkStatus} disabled={loading} className={`flex-shrink-0 w-full py-5 rounded-2xl font-black text-[13px] tracking-widest transition-all shadow-xl flex items-center justify-center gap-3 mb-2 ${loading ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 active:scale-95'}`}>
                        {loading && (
                            <svg className="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        )}
                        {loading ? 'INTERROGATING SENSORS...' : '🚂 CHECK LIVE STATUS'}
                    </button>

                    {showLogs && (
                        <div className="absolute inset-x-4 bottom-24 bg-black/95 border border-slate-800 rounded-2xl p-4 h-[40%] overflow-y-auto z-10 font-mono text-[9px] shadow-2xl backdrop-blur-xl flex flex-col">
                            <div className="flex justify-between border-b border-slate-900 pb-2 mb-2 items-center text-[9px] uppercase font-bold sticky top-0 bg-black/95">
                                <span className="text-blue-400 tracking-widest">Telemetry Console</span>
                                <button onClick={() => setLogs([])} className="text-slate-500 hover:text-white bg-slate-900 px-2 py-1 rounded">Clear</button>
                            </div>
                            <div className="flex flex-col gap-1.5 overflow-y-auto flex-grow">
                                {logs.map((log, i) => (
                                    <div key={i} className="mb-1 border-l-2 border-slate-800 pl-2 leading-tight">
                                        <span className="text-slate-600">[{log.time}]</span> <span className={log.type === 'err' ? 'text-red-400 font-bold' : log.type === 'detail' ? 'text-amber-200' : 'text-emerald-400'}>{log.msg}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
